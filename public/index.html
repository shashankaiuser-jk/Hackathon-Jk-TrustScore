<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CreditLens AI — Credit Intelligence Dashboard</title>
<style>
  :root {
    --navy:    #0F2645;
    --blue:    #1D4ED8;
    --blue2:   #2563EB;
    --sky:     #EFF6FF;
    --pale:    #DBEAFE;
    --teal:    #0891B2;
    --purple:  #7C3AED;
    --amber:   #D97706;
    --green:   #16A34A;
    --red:     #DC2626;
    --gray50:  #F9FAFB;
    --gray100: #F3F4F6;
    --gray200: #E5E7EB;
    --gray400: #9CA3AF;
    --gray600: #4B5563;
    --gray700: #374151;
    --gray900: #111827;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--gray50); color: var(--gray700); min-height: 100vh; }

  /* ── Layout ────────────────────────────────────────────────────────── */
  .topbar {
    background: var(--navy);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.35);
  }
  .topbar-left { display: flex; align-items: center; gap: .75rem; }
  .topbar-logo { font-size: 1.15rem; font-weight: 800; color: #fff; letter-spacing: -.3px; }
  .topbar-logo span { color: #60A5FA; }
  .topbar-badge { background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3); color: #93C5FD; font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: .5px; }
  .api-status { display: flex; align-items: center; gap: .5rem; font-size: .75rem; color: #9CA3AF; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.green { background: #4ADE80; box-shadow: 0 0 6px #4ADE80; }
  .dot.red   { background: #F87171; }

  .shell { display: flex; min-height: calc(100vh - 56px); }
  .sidebar { width: 260px; min-width: 260px; background: #fff; border-right: 1px solid var(--gray200); display: flex; flex-direction: column; }
  .main { flex: 1; padding: 2rem; overflow-y: auto; }

  /* ── Sidebar ───────────────────────────────────────────────────────── */
  .sidebar-section { padding: 1rem 1.25rem .5rem; font-size: .65rem; font-weight: 700; color: var(--gray400); letter-spacing: 1px; text-transform: uppercase; }
  .sidebar-item { display: flex; align-items: center; gap: .75rem; padding: .65rem 1.25rem; font-size: .82rem; font-weight: 500; color: var(--gray600); cursor: pointer; border-left: 3px solid transparent; transition: all .15s; }
  .sidebar-item:hover { background: var(--sky); color: var(--blue2); }
  .sidebar-item.active { background: var(--sky); color: var(--blue2); border-left-color: var(--blue2); font-weight: 600; }
  .sidebar-item .icon { font-size: 1rem; width: 20px; text-align: center; }
  .partner-card { margin: 1rem; background: var(--navy); border-radius: 12px; padding: 1rem; color: #fff; }
  .partner-name { font-size: .75rem; font-weight: 700; color: #93C5FD; margin-bottom: .25rem; }
  .partner-id   { font-size: 1rem; font-weight: 800; }
  .partner-meta { margin-top: .75rem; display: flex; gap: .5rem; flex-wrap: wrap; }
  .pmeta { background: rgba(255,255,255,.1); border-radius: 6px; padding: 2px 8px; font-size: .68rem; color: #BAE6FD; }

  /* ── Header / page title ───────────────────────────────────────────── */
  .page-header { margin-bottom: 1.5rem; }
  .page-title { font-size: 1.5rem; font-weight: 800; color: var(--gray900); }
  .page-sub   { font-size: .83rem; color: var(--gray600); margin-top: .25rem; }

  /* ── Stat cards ────────────────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
  .stat-card { background: #fff; border-radius: 12px; padding: 1.25rem; border: 1px solid var(--gray200); position: relative; overflow: hidden; }
  .stat-card::before { content:''; position:absolute; inset:0; left:0; width:4px; }
  .stat-card.blue::before   { background: var(--blue2); }
  .stat-card.green::before  { background: var(--green); }
  .stat-card.amber::before  { background: var(--amber); }
  .stat-card.red::before    { background: var(--red); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-label { font-size: .7rem; font-weight: 700; color: var(--gray400); letter-spacing: .5px; text-transform: uppercase; margin-bottom: .4rem; }
  .stat-value { font-size: 2rem; font-weight: 800; color: var(--gray900); line-height: 1; }
  .stat-sub   { font-size: .72rem; color: var(--gray600); margin-top: .3rem; }
  .stat-badge { display: inline-block; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: .4rem; }

  /* ── Trust score gauge ─────────────────────────────────────────────── */
  .trust-panel { background: var(--navy); border-radius: 16px; padding: 2rem; margin-bottom: 1.75rem; display: flex; align-items: center; gap: 2rem; }
  .gauge-wrap { position: relative; width: 140px; flex-shrink: 0; }
  .gauge-svg  { width: 140px; height: 100px; }
  .gauge-score { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; }
  .gauge-num  { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; }
  .gauge-max  { font-size: .7rem; color: #64748B; }
  .trust-info { flex: 1; color: #fff; }
  .trust-grade { font-size: 2.5rem; font-weight: 900; color: #60A5FA; line-height: 1; }
  .trust-risk  { font-size: .8rem; font-weight: 600; margin-top: .25rem; margin-bottom: 1rem; }
  .breakdown-bars { display: grid; gap: .4rem; }
  .bbar-row { display: flex; align-items: center; gap: .5rem; }
  .bbar-label { font-size: .68rem; color: #94A3B8; width: 120px; flex-shrink: 0; }
  .bbar-track { flex: 1; background: rgba(255,255,255,.1); border-radius: 4px; height: 7px; }
  .bbar-fill  { height: 100%; border-radius: 4px; transition: width .8s ease; }
  .bbar-val   { font-size: .68rem; color: #93C5FD; width: 40px; text-align: right; }

  /* ── Loan table ────────────────────────────────────────────────────── */
  .card { background: #fff; border-radius: 12px; border: 1px solid var(--gray200); margin-bottom: 1.5rem; overflow: hidden; }
  .card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray200); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: .9rem; font-weight: 700; color: var(--gray900); }
  .card-sub   { font-size: .75rem; color: var(--gray400); }

  table { width: 100%; border-collapse: collapse; }
  th { padding: .6rem 1rem; text-align: left; font-size: .68rem; font-weight: 700; color: var(--gray400); letter-spacing: .5px; text-transform: uppercase; background: var(--gray50); border-bottom: 1px solid var(--gray200); }
  td { padding: .85rem 1rem; font-size: .82rem; border-bottom: 1px solid var(--gray100); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.loan-row { cursor: pointer; transition: background .15s; }
  tr.loan-row:hover td { background: var(--sky); }

  /* ── Score pill / badge ────────────────────────────────────────────── */
  .score-pill { display: inline-flex; align-items: center; gap: .35rem; font-weight: 700; font-size: .82rem; padding: .25rem .7rem; border-radius: 20px; }
  .score-pill.green  { background: #D1FAE5; color: #065F46; }
  .score-pill.yellow { background: #FEF9C3; color: #854D0E; }
  .score-pill.orange { background: #FFEDD5; color: #9A3412; }
  .score-pill.red    { background: #FEE2E2; color: #991B1B; }

  .risk-tag { display: inline-block; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .3px; }
  .risk-tag.low      { background: #D1FAE5; color: #065F46; }
  .risk-tag.medium   { background: #FEF9C3; color: #854D0E; }
  .risk-tag.high     { background: #FFEDD5; color: #9A3412; }
  .risk-tag.critical { background: #FEE2E2; color: #991B1B; }

  /* ── CTA button ────────────────────────────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .45rem 1rem; border-radius: 8px; font-size: .78rem; font-weight: 700; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--blue2); color: #fff; }
  .btn-primary:hover { background: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.35); }
  .btn-primary:disabled { background: var(--gray200); color: var(--gray400); cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-ghost { background: transparent; color: var(--blue2); border: 1px solid var(--pale); }
  .btn-ghost:hover { background: var(--sky); }

  /* ── Spinner ───────────────────────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }

  /* ── Loan detail panel ─────────────────────────────────────────────── */
  .drawer { position: fixed; inset: 0; z-index: 200; display: none; }
  .drawer.open { display: flex; }
  .drawer-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
  .drawer-panel { position: absolute; right: 0; top: 0; bottom: 0; width: min(680px, 100vw); background: #fff; overflow-y: auto; box-shadow: -8px 0 32px rgba(0,0,0,.2); animation: slideIn .25s ease; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-header { background: var(--navy); padding: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; }
  .drawer-close  { background: rgba(255,255,255,.1); border: none; color: #fff; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
  .drawer-body   { padding: 1.5rem; }

  /* ── Section inside drawer ─────────────────────────────────────────── */
  .dsec-title { font-size: .8rem; font-weight: 700; color: var(--gray400); letter-spacing: .5px; text-transform: uppercase; margin: 1.5rem 0 .75rem; display: flex; align-items: center; gap: .4rem; }
  .dsec-title::after { content:''; flex: 1; height: 1px; background: var(--gray200); }

  /* ── Workflow list ─────────────────────────────────────────────────── */
  .wf-item { padding: .7rem .85rem; border-radius: 8px; margin-bottom: .4rem; border-left: 3px solid; font-size: .8rem; }
  .wf-item.high_risk  { background: #FFF5F5; border-color: var(--red); }
  .wf-item.medium_risk{ background: #FFFBEB; border-color: var(--amber); }
  .wf-item.positive   { background: #F0FDF4; border-color: var(--green); }
  .wf-item.low_risk   { background: #FEFCE8; border-color: #CA8A04; }
  .wf-name   { font-weight: 700; color: var(--gray900); margin-bottom: .25rem; display: flex; align-items: center; gap: .4rem; }
  .wf-id     { font-size: .65rem; color: var(--gray400); font-weight: 400; }
  .wf-reason { color: var(--gray600); line-height: 1.45; }
  .wf-impact { font-size: .7rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
  .wf-impact.neg { background: #FEE2E2; color: #991B1B; }
  .wf-impact.pos { background: #D1FAE5; color: #065F46; }
  .wf-butterfly { margin-top: .4rem; font-size: .72rem; color: var(--purple); background: #F5F3FF; padding: .3rem .5rem; border-radius: 5px; border-left: 2px solid var(--purple); }
  .wf-aha { margin-top: .4rem; font-size: .72rem; color: var(--amber); background: #FFFBEB; padding: .3rem .5rem; border-radius: 5px; border-left: 2px solid var(--amber); }

  /* ── Score donut mini ──────────────────────────────────────────────── */
  .score-ring { display: inline-flex; align-items: center; justify-content: center; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }

  /* ── Insight cards ─────────────────────────────────────────────────── */
  .insight-card { background: var(--sky); border: 1px solid var(--pale); border-radius: 10px; padding: 1rem; margin-bottom: .75rem; display: flex; gap: .75rem; }
  .insight-num  { width: 26px; height: 26px; border-radius: 50%; background: var(--blue2); color: #fff; font-size: .72rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .insight-text { font-size: .82rem; color: var(--gray700); line-height: 1.5; }

  .bf-card { background: #FFF5F5; border: 1px solid #FECACA; border-radius: 10px; padding: 1rem; margin-bottom: .75rem; }
  .bf-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
  .bf-title  { font-size: .82rem; font-weight: 700; color: #991B1B; }
  .bf-sev    { font-size: .65rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; background: #FEE2E2; color: #991B1B; text-transform: uppercase; }
  .bf-chain  { display: flex; flex-wrap: wrap; align-items: center; gap: .25rem; }
  .bf-step   { font-size: .72rem; color: var(--gray700); background: var(--gray100); padding: 2px 8px; border-radius: 4px; }
  .bf-arrow  { color: var(--red); font-size: .65rem; }

  .aha-card { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px; padding: .85rem 1rem; margin-bottom: .6rem; font-size: .8rem; color: var(--gray700); line-height: 1.5; }
  .aha-card::before { content: '💡 '; }

  /* ── Reasoning box ─────────────────────────────────────────────────── */
  .reasoning-box { background: var(--gray50); border: 1px solid var(--gray200); border-radius: 10px; padding: 1rem; font-size: .82rem; color: var(--gray700); line-height: 1.6; }

  /* ── Progress steps ────────────────────────────────────────────────── */
  .steps { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .step { display: flex; align-items: center; gap: .3rem; font-size: .72rem; color: var(--gray400); }
  .step.done  { color: var(--green); }
  .step.active{ color: var(--blue2); font-weight: 600; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .step::after { content: '›'; margin-left: .3rem; color: var(--gray300); }
  .step:last-child::after { display: none; }

  /* ── Loading overlay ───────────────────────────────────────────────── */
  .loading-bar { height: 3px; background: linear-gradient(90deg, var(--blue2), var(--teal), var(--purple)); background-size: 200% 100%; animation: loading 1.5s linear infinite; border-radius: 2px; margin-bottom: 1rem; }
  @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .empty-state { text-align: center; padding: 3rem 2rem; color: var(--gray400); }
  .empty-state .icon { font-size: 3rem; margin-bottom: .75rem; }
  .empty-state h3 { font-size: 1rem; font-weight: 600; color: var(--gray600); margin-bottom: .5rem; }
  .empty-state p  { font-size: .82rem; }

  /* ── Tabs ──────────────────────────────────────────────────────────── */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gray200); margin-bottom: 1.25rem; }
  .tab  { padding: .6rem 1.1rem; font-size: .8rem; font-weight: 600; color: var(--gray400); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .tab:hover { color: var(--blue2); }
  .tab.active { color: var(--blue2); border-bottom-color: var(--blue2); }
  .tab-panel  { display: none; }
  .tab-panel.active { display: block; }

  /* ── Factor bar ────────────────────────────────────────────────────── */
  .factor-item { display: flex; align-items: flex-start; gap: .75rem; padding: .75rem 0; border-bottom: 1px solid var(--gray100); }
  .factor-item:last-child { border-bottom: none; }
  .factor-icon { font-size: 1rem; margin-top: .1rem; }
  .factor-body { flex: 1; }
  .factor-name { font-size: .82rem; font-weight: 700; color: var(--gray900); margin-bottom: .2rem; }
  .factor-desc { font-size: .76rem; color: var(--gray600); line-height: 1.4; }
  .factor-bar-wrap { margin-top: .35rem; background: var(--gray200); border-radius: 4px; height: 5px; }
  .factor-bar { height: 100%; border-radius: 4px; transition: width .6s ease; }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar { display: none; }
    .trust-panel { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">Credit<span>Lens</span> AI</div>
    <div class="topbar-badge">AGENTIC · v2.0</div>
  </div>
  <div class="api-status">
    <div class="dot" id="apiDot"></div>
    <span id="apiStatusText">Connecting…</span>
  </div>
</div>

<div class="shell">
  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="partner-card">
      <div class="partner-name">CHANNEL PARTNER</div>
      <div class="partner-id" id="sidePartnerId">—</div>
      <div class="partner-meta" id="sidePartnerMeta"></div>
    </div>
    <div class="sidebar-section">Navigation</div>
    <div class="sidebar-item active" onclick="showView('dashboard')"><span class="icon">🏠</span> Dashboard</div>
    <div class="sidebar-item" onclick="showView('loans')"><span class="icon">🏦</span> Loan Portfolio</div>
    <div class="sidebar-item" onclick="showView('butterfly')"><span class="icon">🦋</span> Butterfly Effects</div>
    <div class="sidebar-item" onclick="showView('insights')"><span class="icon">💡</span> AI Insights</div>
    <div class="sidebar-section">Actions</div>
    <div class="sidebar-item" id="runAllBtn" onclick="runFullDemo()"><span class="icon">⚡</span> Run Full Analysis</div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────────── -->
  <main class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">🧠</div>
      <h3>No analysis run yet</h3>
      <p>Click <strong>Run Full Analysis</strong> in the sidebar, or click<br>
         <strong>Run AI Health Check</strong> on any loan below.</p>
      <br/>
      <button class="btn btn-primary" style="margin: 0 auto; display:inline-flex;" onclick="runFullDemo()">⚡ Run Full Analysis</button>
    </div>
  </main>
</div>

<!-- ── Loan Detail Drawer ─────────────────────────────────────────────── -->
<div class="drawer" id="drawer">
  <div class="drawer-backdrop" onclick="closeDrawer()"></div>
  <div class="drawer-panel">
    <div class="drawer-header">
      <div>
        <div style="font-size:.7rem;color:#93C5FD;font-weight:700;margin-bottom:.25rem;">LOAN HEALTH DETAIL</div>
        <div style="font-size:1.2rem;font-weight:800;color:#fff;" id="drawerLoanId">—</div>
        <div style="margin-top:.5rem;display:flex;gap:.5rem;" id="drawerBadges"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────────
const API = 'http://localhost:3000';
let state = { partner: null, currentView: 'dashboard', loading: false };

// ─────────────────────────────────────────────────────────────────────────
//  API helpers
// ─────────────────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, { headers: { 'Content-Type':'application/json' }, ...opts });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'API error');
  return json.data;
}

// ─────────────────────────────────────────────────────────────────────────
//  API status check
// ─────────────────────────────────────────────────────────────────────────
async function checkApi() {
  try {
    await apiFetch('/api/health');
    document.getElementById('apiDot').className = 'dot green';
    document.getElementById('apiStatusText').textContent = 'Server online';
  } catch {
    document.getElementById('apiDot').className = 'dot red';
    document.getElementById('apiStatusText').textContent = 'Server offline — start with: node src/index.js';
  }
}

// ─────────────────────────────────────────────────────────────────────────
//  Run full demo
// ─────────────────────────────────────────────────────────────────────────
async function runFullDemo() {
  if (state.loading) return;
  state.loading = true;
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="page-header">
      <div class="page-title">Running Analysis…</div>
      <div class="page-sub">5-step agentic pipeline executing across all loans</div>
    </div>
    <div class="loading-bar"></div>
    <div class="steps">
      <div class="step active"><div class="step-dot"></div>Data Aggregation</div>
      <div class="step"><div class="step-dot"></div>Parameter Extraction</div>
      <div class="step"><div class="step-dot"></div>Workflow Generation</div>
      <div class="step"><div class="step-dot"></div>Loan Health Scoring</div>
      <div class="step"><div class="step-dot"></div>Trust Score</div>
    </div>
    <div style="color:var(--gray400);font-size:.82rem;">Calling LLM for reasoning — may take 10-20 seconds…</div>`;

  try {
    const data = await apiFetch('/api/demo');
    state.partner = data;
    state.loading = false;
    updateSidebar(data);
    renderDashboard(data);
  } catch (e) {
    state.loading = false;
    main.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>${e.message}</p><br/><button class="btn btn-primary" onclick="runFullDemo()">Retry</button></div>`;
  }
}

async function runLoanCheck(loanId) {
  const btn = document.getElementById(`btn-${loanId}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Running…'; }

  try {
    const data = await apiFetch(`/api/explain/${loanId}`);
    // Update that loan's row in the partner state if available
    if (state.partner) {
      const idx = state.partner.loanScores.findIndex(l => l.loanId === loanId);
      if (idx !== -1) Object.assign(state.partner.loanScores[idx], data);
    }
    openDrawer(data);
  } catch (e) {
    alert(`Error: ${e.message}`);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '🔍 Health Check'; }
  }
}

// ─────────────────────────────────────────────────────────────────────────
//  Sidebar
// ─────────────────────────────────────────────────────────────────────────
function updateSidebar(partner) {
  document.getElementById('sidePartnerId').textContent = partner.partnerId;
  document.getElementById('sidePartnerMeta').innerHTML = `
    <div class="pmeta">${partner.grade}</div>
    <div class="pmeta">${partner.trustScore}/850</div>
    <div class="pmeta">${partner.riskLevel}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────
//  Views
// ─────────────────────────────────────────────────────────────────────────
function showView(view) {
  state.currentView = view;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (!state.partner) return;
  const p = state.partner;
  if      (view === 'dashboard')  renderDashboard(p);
  else if (view === 'loans')      renderLoans(p);
  else if (view === 'butterfly')  renderButterfly(p);
  else if (view === 'insights')   renderInsights(p);
}

// ─────────────────────────────────────────────────────────────────────────
//  Dashboard view
// ─────────────────────────────────────────────────────────────────────────
function renderDashboard(p) {
  const main = document.getElementById('mainArea');
  const bd = p.scoreBreakdown;
  const loanStats = p.loanScores;
  const wfTotal = loanStats.reduce((s,l) => s + (l.workflowSummary?.total||0), 0);
  const bfCount = p.butterflyEffects?.length || 0;

  main.innerHTML = `
    <div class="page-header">
      <div class="page-title">Credit Intelligence Dashboard</div>
      <div class="page-sub">Partner: ${p.partnerId} · ${p.loanScores.length} active loans · Last run: ${new Date(p.timestamp).toLocaleTimeString()}</div>
    </div>

    <!-- Trust Score Panel -->
    <div class="trust-panel">
      <div class="gauge-wrap">
        ${gaugeHTML(p.trustScore, 850)}
        <div class="gauge-score">
          <div class="gauge-num">${p.trustScore}</div>
          <div class="gauge-max">/ 850</div>
        </div>
      </div>
      <div class="trust-info">
        <div style="font-size:.7rem;color:#93C5FD;font-weight:700;letter-spacing:1px;margin-bottom:.25rem;">CHANNEL PARTNER TRUST SCORE</div>
        <div class="trust-grade">${p.grade}</div>
        <div class="trust-risk" style="color:${riskColor(p.riskLevel)};">${p.riskLevel.replace('_',' ').toUpperCase()}</div>
        <div class="breakdown-bars">
          ${bbarHTML('Loan Health (60%)', bd.loanHealthContribution, 510, '#3B82F6')}
          ${bbarHTML('Financial (20%)',   bd.financialContribution,  170, '#10B981')}
          ${bbarHTML('Behavioral (12%)',  bd.behavioralContribution, 102, '#8B5CF6')}
          ${bbarHTML('Contextual (8%)',   bd.contextualContribution,  68, '#F59E0B')}
        </div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stat-grid">
      <div class="stat-card blue">
        <div class="stat-label">Trust Score</div>
        <div class="stat-value">${p.trustScore}</div>
        <div class="stat-sub">out of 850 · Grade ${p.grade}</div>
      </div>
      <div class="stat-card ${p.loanScores.some(l=>l.riskLevel==='critical')?'red':'green'}">
        <div class="stat-label">Active Loans</div>
        <div class="stat-value">${p.loanScores.length}</div>
        <div class="stat-sub">${p.loanScores.filter(l=>l.riskLevel==='critical').length} critical · ${p.loanScores.filter(l=>l.riskLevel==='low').length} low risk</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Workflows Run</div>
        <div class="stat-value">${wfTotal}</div>
        <div class="stat-sub">Across ${p.loanScores.length} loans · Agentic paths</div>
      </div>
      <div class="stat-card ${bfCount>3?'red':bfCount>0?'amber':'green'}">
        <div class="stat-label">Butterfly Triggers</div>
        <div class="stat-value">${bfCount}</div>
        <div class="stat-sub">${p.ahaMoments?.length||0} Aha Moments detected</div>
      </div>
    </div>

    <!-- Loan summary table -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Loan Portfolio</div>
        <div class="card-sub">Click any row to drill down • Click button to run individual health check</div>
      </div>
      <table>
        <thead><tr>
          <th>Loan ID</th><th>Type</th><th>Score</th><th>Risk Level</th>
          <th>Workflows</th><th>High-Risk WF</th><th>Action</th>
        </tr></thead>
        <tbody>
          ${p.loanScores.map(l => `
          <tr class="loan-row" onclick="openDrawer(${JSON.stringify(l).replace(/"/g,'&quot;')})">
            <td><strong>${l.loanId}</strong></td>
            <td style="color:var(--gray600);font-size:.76rem;">${l.parameters?.loan ? 'Working Capital' : '—'}</td>
            <td>${scorePillHTML(l.score, l.grade)}</td>
            <td><span class="risk-tag ${l.riskLevel}">${l.riskLevel}</span></td>
            <td style="font-size:.78rem;">${l.workflowSummary?.triggered||0} / ${l.workflowSummary?.total||0}</td>
            <td style="font-size:.78rem;color:${l.workflowSummary?.highRisk>0?'var(--red)':'var(--green)'};">
              ${l.workflowSummary?.highRisk||0}
            </td>
            <td onclick="event.stopPropagation()">
              <button class="btn btn-primary" id="btn-${l.loanId}" onclick="runLoanCheck('${l.loanId}')">🔍 Health Check</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- Top insights -->
    <div class="card">
      <div class="card-header"><div class="card-title">🤖 Top AI Insights</div></div>
      <div style="padding:1.25rem;">
        ${(p.topInsights||[]).map((ins,i) => `
        <div class="insight-card">
          <div class="insight-num">${i+1}</div>
          <div class="insight-text">${ins}</div>
        </div>`).join('') || '<div style="color:var(--gray400);font-size:.82rem;padding:.5rem;">No insights generated.</div>'}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
//  Loans view
// ─────────────────────────────────────────────────────────────────────────
function renderLoans(p) {
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="page-header">
      <div class="page-title">Loan Portfolio</div>
      <div class="page-sub">Run individual health checks or view full workflow breakdowns</div>
    </div>
    ${p.loanScores.map(l => loanCardHTML(l)).join('')}`;
}

function loanCardHTML(l) {
  const ws = l.workflowSummary || {};

  <div class="card" style="margin-bottom:1.5rem;">
    <div class="card-header">
      <div>
        <div class="card-title">${l.loanId}</div>
        <div style="margin-top:.4rem;display:flex;gap:.5rem;align-items:center;">
          ${scorePillHTML(l.score, l.grade)}
          <span class="risk-tag ${l.riskLevel}">${l.riskLevel}</span>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-${l.loanId}" onclick="runLoanCheck('${l.loanId}')">🔍 Run AI Health Check</button>
    </div>
    <div style="padding:1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;border-bottom:1px solid var(--gray200);">
      <div><div style="font-size:.68rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">WORKFLOWS</div><div style="font-size:1.4rem;font-weight:800;">${ws.triggered||0}<span style="font-size:.8rem;color:var(--gray400);font-weight:400;">/${ws.total||0}</span></div></div>
      <div><div style="font-size:.68rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">HIGH-RISK</div><div style="font-size:1.4rem;font-weight:800;color:${(ws.highRisk||0)>0?'var(--red)':'var(--green)'};">${ws.highRisk||0}</div></div>
      <div><div style="font-size:.68rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">POSITIVE</div><div style="font-size:1.4rem;font-weight:800;color:var(--green);">${ws.positive||0}</div></div>
      <div><div style="font-size:.68rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">SCORE IMPACT</div><div style="font-size:1.4rem;font-weight:800;color:${(ws.scoreImpact||0)>=0?'var(--green)':'var(--red)'};">${(ws.scoreImpact||0)>=0?'+':''}${(ws.scoreImpact||0).toFixed(1)}</div></div>
    </div>
    <div style="padding:1.25rem;">
      <div style="font-size:.75rem;font-weight:700;color:var(--gray400);margin-bottom:.75rem;">AI REASONING</div>
      <div class="reasoning-box">${l.reasoning || 'Click "Run AI Health Check" to generate reasoning.'}</div>
    </div>
    <div style="padding:0 1.25rem 1.25rem;">
      <button class="btn btn-ghost" onclick="openDrawer(${JSON.stringify(l).replace(/"/g,'&quot;')})">View Full Breakdown →</button>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
//  Butterfly view
// ─────────────────────────────────────────────────────────────────────────
function renderButterfly(p) {
  const all = p.butterflyEffects || [];
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="page-header">
      <div class="page-title">🦋 Butterfly Effect Analysis</div>
      <div class="page-sub">Small signal triggers with cascading impact chains</div>
    </div>
    ${all.length === 0 ? '<div class="empty-state"><div class="icon">🦋</div><h3>No butterfly triggers</h3><p>Run analysis to detect cascading effects.</p></div>' :
      all.map(b => bfDetailHTML(b)).join('')}
    ${(p.ahaMoments||[]).length > 0 ? `
    <div class="card">
      <div class="card-header"><div class="card-title">💡 Aha Moments</div><div class="card-sub">Unexpected, non-obvious cross-signal insights</div></div>
      <div style="padding:1.25rem;">
        ${p.ahaMoments.map(a => `<div class="aha-card">${a}</div>`).join('')}
      </div>
    </div>` : ''}`;
}

function bfDetailHTML(b) {
  const sevColor = { critical:'#DC2626', high:'#EA580C', medium:'#D97706', low:'#16A34A' };
  return `
  <div class="bf-card" style="margin-bottom:1rem;">
    <div class="bf-header">
      <div class="bf-title">🦋 ${b.trigger}</div>
      <div class="bf-sev">${b.severity}</div>
    </div>
    <div style="font-size:.75rem;color:var(--gray600);margin-bottom:.6rem;">${b.potentialImpact||''}</div>
    ${b.chain && b.chain.length > 1 ? `
    <div style="font-size:.7rem;font-weight:700;color:var(--gray400);margin-bottom:.4rem;">CASCADE CHAIN</div>
    <div class="bf-chain">
      ${b.chain.map((s,i) => `<div class="bf-step">${s.trim()}</div>${i<b.chain.length-1?'<div class="bf-arrow">→</div>':''}`).join('')}
    </div>` : ''}
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
//  Insights view
// ─────────────────────────────────────────────────────────────────────────
function renderInsights(p) {
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="page-header">
      <div class="page-title">🤖 AI Insights & Reasoning</div>
      <div class="page-sub">LLM-generated intelligence across all loans and the channel partner</div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Top 3 Partner Insights</div></div>
      <div style="padding:1.25rem;">
        ${(p.topInsights||[]).map((ins,i) => `<div class="insight-card"><div class="insight-num">${i+1}</div><div class="insight-text">${ins}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Credit Committee Reasoning</div></div>
      <div style="padding:1.25rem;"><div class="reasoning-box" style="line-height:1.7;">${p.fullReasoning||'—'}</div></div>
    </div>
    ${p.loanScores.map(l => `
    <div class="card">
      <div class="card-header"><div class="card-title">📋 ${l.loanId} — Analyst Reasoning</div><div class="card-sub">${l.score}/100 · ${l.grade} · ${l.riskLevel}</div></div>
      <div style="padding:1.25rem;"><div class="reasoning-box">${l.reasoning||'Run health check to generate.'}</div></div>
    </div>`).join('')}`;
}

// ─────────────────────────────────────────────────────────────────────────
//  Drawer
// ─────────────────────────────────────────────────────────────────────────
function openDrawer(loanOrStr) {
  const l = typeof loanOrStr === 'string' ? JSON.parse(loanOrStr) : loanOrStr;
  document.getElementById('drawerLoanId').textContent = l.loanId || l.loanId;
  document.getElementById('drawerBadges').innerHTML = `
    ${scorePillHTML(l.score, l.grade)}
    <span class="risk-tag ${l.riskLevel}">${l.riskLevel}</span>`;

  const triggered = (l.workflowResults||l.triggeredWorkflows||[]).filter(w => w && w.triggered);
  const bf = l.butterflyTriggers || [];
  const factors = l.topFactors || [];
  const ahas = (l.workflowResults||l.triggeredWorkflows||[]).filter(w=>w&&w.ahaInsight).map(w=>w.ahaInsight);

  document.getElementById('drawerBody').innerHTML = `
    <!-- Score summary -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:.25rem;">
      <div style="background:var(--sky);border-radius:8px;padding:.75rem;text-align:center;">
        <div style="font-size:.65rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">HEALTH SCORE</div>
        <div style="font-size:1.8rem;font-weight:900;color:var(--navy);">${l.score}</div>
        <div style="font-size:.7rem;color:var(--gray500);">/ 100</div>
      </div>
      <div style="background:var(--sky);border-radius:8px;padding:.75rem;text-align:center;">
        <div style="font-size:.65rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">WORKFLOWS</div>
        <div style="font-size:1.8rem;font-weight:900;color:var(--navy);">${(l.workflowSummary?.triggered||triggered.length)}</div>
        <div style="font-size:.7rem;color:var(--gray500);">triggered</div>
      </div>
      <div style="background:var(--sky);border-radius:8px;padding:.75rem;text-align:center;">
        <div style="font-size:.65rem;color:var(--gray400);font-weight:700;margin-bottom:.2rem;">SCORE IMPACT</div>
        <div style="font-size:1.8rem;font-weight:900;color:${(l.workflowSummary?.scoreImpact||0)>=0?'var(--green)':'var(--red)'};">
          ${(l.workflowSummary?.scoreImpact||0)>=0?'+':''}${(l.workflowSummary?.scoreImpact||0).toFixed(0)}</div>
        <div style="font-size:.7rem;color:var(--gray500);">pts from AI</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab(event,'tab-factors')">📊 Top Factors</div>
      <div class="tab" onclick="switchTab(event,'tab-workflows')">⚙️ Workflows (${triggered.length})</div>
      <div class="tab" onclick="switchTab(event,'tab-butterfly')">🦋 Butterfly (${bf.length})</div>
      <div class="tab" onclick="switchTab(event,'tab-reasoning')">🧠 Reasoning</div>
    </div>

    <!-- Factors panel -->
    <div id="tab-factors" class="tab-panel active">
      ${factors.map(f => `
      <div class="factor-item">
        <div class="factor-icon">${f.impact==='positive'?'✅':f.impact==='negative'?'🔴':'⚪'}</div>
        <div class="factor-body">
          <div class="factor-name">${f.factor}</div>
          <div class="factor-desc">${f.description}</div>
          <div class="factor-bar-wrap">
            <div class="factor-bar" style="width:${Math.min(100,f.weight*100)}%;background:${f.impact==='positive'?'var(--green)':f.impact==='negative'?'var(--red)':'var(--gray400)'};"></div>
          </div>
        </div>
      </div>`).join('') || '<div style="color:var(--gray400);font-size:.82rem;padding:.5rem;">No factors available.</div>'}
    </div>

    <!-- Workflows panel -->
    <div id="tab-workflows" class="tab-panel">
      ${triggered.length === 0 ? '<div style="color:var(--gray400);font-size:.82rem;padding:.5rem;">No workflows triggered.</div>' :
        triggered.map(w => `
        <div class="wf-item ${w.signal}">
          <div class="wf-name">
            <span class="wf-id">[${w.workflowId}]</span>
            ${w.name}
            <span class="wf-impact ${w.scoreImpact<0?'neg':'pos'}">${w.scoreImpact>0?'+':''}${w.scoreImpact}</span>
          </div>
          <div class="wf-reason">${w.reason}</div>
          ${w.butterflyEffect ? `<div class="wf-butterfly">🦋 ${w.butterflyEffect}</div>` : ''}
          ${w.ahaInsight      ? `<div class="wf-aha">💡 ${w.ahaInsight}</div>`            : ''}
        </div>`).join('')}
    </div>

    <!-- Butterfly panel -->
    <div id="tab-butterfly" class="tab-panel">
      ${bf.length === 0 ? '<div style="color:var(--gray400);font-size:.82rem;padding:.5rem;">No butterfly triggers for this loan.</div>' :
        bf.map(b => bfDetailHTML(b)).join('')}
      ${ahas.length > 0 ? `
        <div class="dsec-title">💡 Aha Moments</div>
        ${ahas.map(a => `<div class="aha-card">${a}</div>`).join('')}` : ''}
    </div>

    <!-- Reasoning panel -->
    <div id="tab-reasoning" class="tab-panel">
      <div class="dsec-title">AI Analyst Reasoning</div>
      <div class="reasoning-box" style="line-height:1.7;">${l.reasoning||'Run health check to generate.'}</div>
    </div>`;

  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

function switchTab(e, tabId) {
  const drawer = document.getElementById('drawerBody');
  drawer.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  drawer.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  e.currentTarget.classList.add('active');
}

// ─────────────────────────────────────────────────────────────────────────
//  Utility renderers
// ─────────────────────────────────────────────────────────────────────────
function scorePillHTML(score, grade) {
  const cls = score>=80?'green':score>=60?'yellow':score>=40?'orange':'red';
  return `<span class="score-pill ${cls}">${score}<span style="font-size:.7rem;opacity:.7;margin-left:1px;">/100</span> · ${grade}</span>`;
}

function riskColor(r) {
  return { very_low:'#4ADE80', low:'#4ADE80', medium:'#FCD34D', high:'#FB923C', very_high:'#F87171', critical:'#F87171' }[r] || '#9CA3AF';
}

function bbarHTML(label, val, max, color) {
  const pct = Math.round((val/max)*100);
  return `<div class="bbar-row">
    <div class="bbar-label">${label}</div>
    <div class="bbar-track"><div class="bbar-fill" style="width:${pct}%;background:${color};"></div></div>
    <div class="bbar-val">${val}/${max}</div>
  </div>`;
}

function gaugeHTML(val, max) {
  const pct  = val / max;
  const r    = 55;
  const circ = Math.PI * r;          // half-circle circumference
  const dash = circ * pct;
  const color = val >= 600 ? '#4ADE80' : val >= 400 ? '#FCD34D' : '#F87171';
  return `<svg class="gauge-svg" viewBox="0 0 140 80">
    <path d="M 15 75 A ${r} ${r} 0 0 1 125 75" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 15 75 A ${r} ${r} 0 0 1 125 75" fill="none" stroke="${color}" stroke-width="10"
      stroke-linecap="round"
      stroke-dasharray="${dash} ${circ}"
      style="transition:stroke-dasharray .9s ease;"/>
  </svg>`;
}

// ─────────────────────────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────────────────────────
checkApi();
</script>
